<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peace</title>
  <link rel="stylesheet" href="css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Klee+One&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Layer 0: WebGL background -->
  <canvas id="bg-canvas"></canvas>

  <!-- Draggable title bar region (frameless window) -->
  <div id="titlebar">
    <div id="titlebar-drag"></div>
    <div id="window-controls">
      <button id="win-minimize" class="win-btn" aria-label="Minimize">
        <svg width="12" height="1"><rect width="12" height="1" fill="currentColor"/></svg>
      </button>
      <button id="win-maximize" class="win-btn" aria-label="Maximize">
        <svg width="10" height="10"><rect width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
      <button id="win-close" class="win-btn win-close" aria-label="Close">
        <svg width="10" height="10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>

  <!-- Layer 1: Top mode switcher — visible only on top 50px hover -->
  <div id="top-trigger"></div>
  <div id="top-menu">
    <button class="menu-btn" data-mode="rain">Rain</button>
    <button class="menu-btn" data-mode="sea">Sea</button>
  </div>

  <!-- Font/size picker removed — now integrated in editor toolbar -->

  <!-- Layer 1.8: Rain Control Panel (right side floating) -->
  <div id="rain-ctrl-toggle" title="Rain settings">
    <!-- Raindrop SVG icon -->
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
    </svg>
  </div>
  <div id="rain-ctrl-panel">
    <div class="ctrl-row">
      <label>Rain</label>
      <input type="range" id="ctrl-rain" min="0" max="100" value="60" class="ctrl-slider" />
      <span class="ctrl-val" id="ctrl-rain-val">60</span>
    </div>
    <div class="ctrl-row">
      <label>Fog</label>
      <input type="range" id="ctrl-fog" min="0" max="100" value="30" class="ctrl-slider" />
      <span class="ctrl-val" id="ctrl-fog-val">30</span>
    </div>
    <div class="ctrl-row">
      <label>Refract</label>
      <input type="range" id="ctrl-refract" min="0" max="100" value="50" class="ctrl-slider" />
      <span class="ctrl-val" id="ctrl-refract-val">50</span>
    </div>
    <div class="ctrl-divider"></div>
    <button id="btn-bg-upload" class="ctrl-btn">Upload BG</button>
  </div>

  <!-- Layer 1.8b: Sea Control Panel (right side floating) -->
  <div id="sea-ctrl-toggle" class="hidden" title="Sea settings">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 12c2-2 4-3 6-3s4 3 6 3 4-3 6-3"/>
      <path d="M2 17c2-2 4-3 6-3s4 3 6 3 4-3 6-3"/>
    </svg>
  </div>
  <div id="sea-ctrl-panel">
    <div class="ctrl-row">
      <label>Waves</label>
      <input type="range" id="ctrl-waves" min="0" max="100" value="50" class="ctrl-slider" />
      <span class="ctrl-val" id="ctrl-waves-val">50</span>
    </div>
    <div class="ctrl-row">
      <label>Rotate</label>
      <input type="range" id="ctrl-rotate" min="0" max="100" value="10" class="ctrl-slider" />
      <span class="ctrl-val" id="ctrl-rotate-val">10</span>
    </div>
    <div class="ctrl-row">
      <label>Horizon</label>
      <input type="range" id="ctrl-horizon" min="0" max="100" value="30" class="ctrl-slider" />
      <span class="ctrl-val" id="ctrl-horizon-val">30</span>
    </div>
  </div>

  <!-- Layer 2: Frosted glass container (The Deck) -->
  <div id="glass-container">
    <!-- Ghost toolbar — appears on hover/selection -->
    <div id="editor-toolbar">
      <!-- Font family dropdown -->
      <select id="tb-font" class="tb-select" title="Font">
        <option value="'Klee One', cursive">Klee</option>
        <option value="Georgia, 'Times New Roman', serif">Serif</option>
        <option value="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">Sans</option>
        <option value="'Cascadia Code', 'Fira Code', 'Consolas', monospace">Mono</option>
      </select>
      <!-- Font size dropdown -->
      <select id="tb-size" class="tb-select" title="Size">
        <option value="small">小</option>
        <option value="medium">中</option>
        <option value="large">大</option>
      </select>
      <!-- Text color picker -->
      <div class="tb-color-wrap" title="Text Color">
        <button class="tb-btn tb-color-btn" id="tb-color-trigger">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.2">
            <text x="3" y="11" font-size="11" font-weight="bold" fill="currentColor" stroke="none">A</text>
          </svg>
          <span id="tb-color-bar"></span>
        </button>
        <div id="tb-color-palette" class="tb-palette">
          <button class="color-swatch" data-color="" title="Default">
            <svg viewBox="0 0 14 14" width="14" height="14"><circle cx="7" cy="7" r="5" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/><line x1="3" y1="11" x2="11" y2="3" stroke="rgba(255,255,255,0.4)" stroke-width="1"/></svg>
          </button>
          <button class="color-swatch" data-color="#ffffff" style="background:#ffffff" title="White"></button>
          <button class="color-swatch" data-color="#a0a0a0" style="background:#a0a0a0" title="Grey"></button>
          <button class="color-swatch" data-color="#f87171" style="background:#f87171" title="Red"></button>
          <button class="color-swatch" data-color="#fb923c" style="background:#fb923c" title="Orange"></button>
          <button class="color-swatch" data-color="#facc15" style="background:#facc15" title="Yellow"></button>
          <button class="color-swatch" data-color="#4ade80" style="background:#4ade80" title="Green"></button>
          <button class="color-swatch" data-color="#38bdf8" style="background:#38bdf8" title="Blue"></button>
          <button class="color-swatch" data-color="#818cf8" style="background:#818cf8" title="Indigo"></button>
          <button class="color-swatch" data-color="#c084fc" style="background:#c084fc" title="Purple"></button>
          <button class="color-swatch" data-color="#f472b6" style="background:#f472b6" title="Pink"></button>
          <button class="color-swatch" data-color="#2dd4bf" style="background:#2dd4bf" title="Teal"></button>
        </div>
      </div>
      <span class="tb-sep"></span>
      <button class="tb-btn" data-action="heading1" title="Heading 1">H1</button>
      <button class="tb-btn" data-action="heading2" title="Heading 2">H2</button>
      <button class="tb-btn" data-action="heading3" title="Heading 3">H3</button>
      <span class="tb-sep"></span>
      <button class="tb-btn" data-action="bold" title="Bold"><strong>B</strong></button>
      <button class="tb-btn" data-action="italic" title="Italic"><em>I</em></button>
      <span class="tb-sep"></span>
      <button class="tb-btn" data-action="taskList" title="Task List">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="1" y="1" width="5" height="5" rx="1"/><path d="M2.5 3.5l1.5 1.5 2.5-3"/>
          <line x1="9" y1="3.5" x2="15" y2="3.5"/>
          <rect x="1" y="10" width="5" height="5" rx="1"/>
          <line x1="9" y1="12.5" x2="15" y2="12.5"/>
        </svg>
      </button>
      <button class="tb-btn" data-action="divider" title="Divider">―</button>
      <button class="tb-btn" data-action="insertImage" title="Image">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="1" y="2" width="14" height="12" rx="2"/><circle cx="5" cy="6" r="1.5"/>
          <path d="M1 11l4-4 3 3 2-2 5 5"/>
        </svg>
      </button>
      <button class="tb-btn" data-action="insertVideo" title="Video">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="1" y="3" width="10" height="10" rx="2"/><path d="M11 6l4-2v8l-4-2"/>
        </svg>
      </button>
    </div>

    <!-- TipTap editor mount point -->
    <div id="editor"></div>

    <!-- Bottom right: action buttons -->
    <div id="actions">
      <div id="save-group">
        <button id="btn-save">Save</button>
        <select id="save-format">
          <option value="html">HTML</option>
          <option value="md">Markdown</option>
        </select>
      </div>
      <button id="btn-release">Release</button>
    </div>

    <!-- Zen Timer: circular ring countdown, anchored to bottom edge -->
    <div id="pomodoro-group">
      <button id="timer-minus" class="timer-adj" aria-label="Subtract 5 minutes">−</button>
      <div id="pomodoro">
        <svg id="timer-ring" viewBox="0 0 80 80" width="64" height="64">
          <circle cx="40" cy="40" r="35" fill="none"
                  stroke="rgba(255,255,255,0.06)" stroke-width="2.5" />
          <circle id="ring-progress" cx="40" cy="40" r="35" fill="none"
                  stroke="rgba(255,255,255,0.35)" stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-dasharray="219.91" stroke-dashoffset="0"
                  transform="rotate(-90 40 40)" />
        </svg>
        <div id="timer-inner">
          <svg id="timer-icon" class="timer-icon" viewBox="0 0 24 24" width="10" height="10">
            <polygon id="icon-play" points="8,4 20,12 8,20" fill="currentColor" stroke="none" />
            <g id="icon-pause" style="display:none;">
              <rect x="6" y="4" width="3.5" height="16" rx="1" fill="currentColor" stroke="none" />
              <rect x="14.5" y="4" width="3.5" height="16" rx="1" fill="currentColor" stroke="none" />
            </g>
          </svg>
          <span id="timer-display">05:00</span>
        </div>
      </div>
      <button id="timer-plus" class="timer-adj" aria-label="Add 5 minutes">+</button>
    </div>
  </div>

  <!-- Layer 3: Vibe Mixer — bottom edge hover to reveal -->
  <div id="vibe-trigger"></div>
  <div id="vibe-mixer">
    <div class="slider-group">
      <label for="slider-blur">Blur</label>
      <input type="range" id="slider-blur" min="0" max="100" value="20" />
      <span class="slider-value" id="blur-value">20</span>
    </div>
    <div class="slider-group">
      <label for="slider-volume">Volume</label>
      <input type="range" id="slider-volume" min="0" max="100" value="10" />
      <span class="slider-value" id="volume-value">10</span>
    </div>
  </div>

  <!-- Audio elements -->
  <audio id="audio-rain" loop preload="auto"></audio>
  <audio id="audio-sea" loop preload="auto"></audio>

  <!-- Background Crop Preview Overlay -->
  <div id="bg-preview-overlay" class="bg-preview-hidden">
    <div id="bg-preview-box">
      <!-- The image sits inside a container; crop rect is drawn on top -->
      <div id="crop-container">
        <img id="bg-preview-img" alt="Preview" draggable="false" />
        <div id="crop-dim-top" class="crop-dim"></div>
        <div id="crop-dim-bottom" class="crop-dim"></div>
        <div id="crop-dim-left" class="crop-dim"></div>
        <div id="crop-dim-right" class="crop-dim"></div>
        <div id="crop-rect">
          <div class="crop-handle crop-handle-tl" data-handle="tl"></div>
          <div class="crop-handle crop-handle-tr" data-handle="tr"></div>
          <div class="crop-handle crop-handle-bl" data-handle="bl"></div>
          <div class="crop-handle crop-handle-br" data-handle="br"></div>
        </div>
      </div>
      <div id="crop-info"></div>
      <div id="bg-preview-actions">
        <button id="bg-preview-cancel" class="preview-btn">Cancel</button>
        <button id="bg-preview-confirm" class="preview-btn preview-btn-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Canvas for burn/ash particle effect -->
  <canvas id="burn-canvas"></canvas>

  <!-- App entry (Vite ES module) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
